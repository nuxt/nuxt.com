shamefullyHoist: true
strictPeerDependencies: false

overrides:
  nostics: ^1.2.0

allowBuilds:
  better-sqlite3: true
  esbuild: true
  rolldown: true
  sharp: true
  "@parcel/watcher": false
  maplibre-gl: false
  puppeteer: false
  unrs-resolver: false
  vue-demi: false

minimumReleaseAgeExclude:
  - eve@0.24.3 || 0.27.0
  - evlog
  - '@nuxt/content'
  - '@nuxt/scripts'
