shamefullyHoist: true
strictPeerDependencies: false

allowBuilds:
  better-sqlite3: true
  esbuild: true
  rolldown: true
  sharp: true
  "@parcel/watcher": false
  maplibre-gl: false
  puppeteer: false
  unrs-resolver: false
  vue-demi: false

minimumReleaseAgeExclude:
  - '@nuxt/ui@4.8.0'
  - '@ai-sdk/gateway@4.0.2'
  - ai@7.0.2
  - eve@0.15.1 || 0.17.0
